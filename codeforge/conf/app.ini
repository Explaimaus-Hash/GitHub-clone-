; CodeForge — branding & app overrides.
; This file is consumed by Gogs as a "custom" override of the embedded conf/app.ini.
; Only safe, brand-facing keys are set here. Operators add server/database
; configuration in their installation's main app.ini, NOT in this file.

BRAND_NAME = CodeForge

[ui]
; Theme color metadata returned by ThemeColorMetaTag()
THEME_COLOR_META_TAG = "#141218"
