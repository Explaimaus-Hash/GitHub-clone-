; CodeForge — locale overrides for en-US.
; Only the user-visible keys that referenced "Gogs" by name are overridden here.
; Every other key falls back to the embedded translation, so this file is small
; and easy to keep in sync with upstream.
;
; Heuristic: replace "Gogs" with "CodeForge" in user-visible strings. Internal
; module references (gogs.io, github.com/gogs/gogs) and HTML structure are kept
; identical to the upstream copy so no Go code path breaks.

app_desc = A self-hosted Git workspace.

[install]
docker_helper = If you're running CodeForge inside Docker, please read <a target="_blank" href="%s">Guidelines</a> carefully before you change anything in this page!
requite_db_desc = CodeForge requires MySQL, PostgreSQL, SQLite3 or TiDB (via MySQL protocol).
run_user_helper = The user must have access to Repository Root Path and run CodeForge.
install_gogs = Install CodeForge
install_success = Welcome to CodeForge — happy hacking!

[settings]
password_username_disabled = Non-local accounts cannot change their username through CodeForge.
ssh_key_been_used = This SSH key has already been added to CodeForge.
unable_verify_ssh_key = CodeForge cannot verify your SSH key, but it's assumed to be valid. Please double-check it.
tokens_desc = Tokens you have generated that can be used to access the CodeForge APIs.
hooks_desc = Webhooks are HTTP POST event triggers. Whenever something occurs in CodeForge, we send a notification to the URL you configure.
add_webhook_desc = CodeForge will send a <code>POST</code> request to the URL you specify, along with details regarding the event that occurred. You can also choose the data format (JSON, x-www-form-urlencoded, XML).
secret_desc = Secret will be sent as SHA256 HMAC hex digest of payload via <code>X-Gogs-Signature</code> header. (Header name kept for backwards compatibility with existing webhook consumers.)

